<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="styles.css">
    <title>Registration form</title>
</head>
<body>
<section class="form-section">

  <form >

    <h2>USER ACCOUNT REGISTRATION FORM</h2>
    
    <div class="input-group">
    <label for="name">FULL NAME:</label>
    <input type="text" name="name" id="name" placeholder="enter your full name">
  </div>

    <div class="input-group">
    <label for="phno">PHONE NO:</label>
    <input type="tel" name="gmail" id="phno" placeholder="enter phone number">
  </div>

    <div class="input-group">
    <label for="email">GMAIL:</label>
    <input type="email" name="gmail" id="gmail" placeholder="enter email">
  </div>

  <div class="input-group">
    <label for="uname">USER NAME:</label>
    <input type="text" name="uname" id="uname" placeholder="enter your user name">
  </div>

    <div class="input-group">
    <label for="pass">PASSWORD:</label>
    <input type="text" name="pass" id="pass" placeholder="enter your password">
  </div>


  <div class="input-group">
  <label for="gender">GENDER:</label>
  <input type="radio" name="gender" id="gender" value="Male">Male
  <input type="radio" name="gender" id="gender" value="Female">Female
 </div>

  <div class="input-group">
    <label for="dob">DATE OF BIRTH:</label>
    <input type="date" name="dob" id="dob" placeholder="enter date of birth">
  </div>

  <div class="input-group">
    <input type="checkbox" name="terms"> I accept to the terms and conditions <br><br>
  </div>

  <button class="sub" type="submit">SUBMIT</button>

</form>
</section>
    
</html>
